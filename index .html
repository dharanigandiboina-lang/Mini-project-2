<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game High-Score Leaderboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#141e30,#243b55);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:900px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#243b55;
    margin-bottom:20px;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:20px;
}

input,select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#243b55;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.rank1{
    background:gold;
    font-weight:bold;
}

.rank2{
    background:silver;
}

.rank3{
    background:#cd7f32;
    color:white;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#666;
}
</style>
</head>
<body>

<div class="container">

<h1>🎮 Game High-Score Leaderboard</h1>

<div class="controls">

<input type="text" id="playerName" placeholder="Player Name">

<input type="number" id="playerScore" placeholder="Score">

<select id="gameType">
<option>BGMI</option>
<option>PUBG</option>
<option>Free Fire</option>
<option>Call of Duty</option>
</select>

<button onclick="addScore()">Add Score</button>

</div>

<div class="controls">
<label><b>Filter Game:</b></label>

<select id="filterGame">
<option value="All">All Games</option>
<option value="BGMI">BGMI</option>
<option value="PUBG">PUBG</option>
<option value="Free Fire">Free Fire</option>
<option value="Call of Duty">Call of Duty</option>
</select>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Game</th>
<th>Score</th>
</tr>
</thead>

<tbody id="leaderboard"></tbody>

</table>

<div class="footer">
Real-Time Leaderboard using LocalStorage
</div>

</div>

<script>

let leaderboardData =
JSON.parse(localStorage.getItem("leaderboardData")) || [

{name:"Dharani", game:"BGMI", score:990},
{name:"Rahul", game:"PUBG", score:950},
{name:"Sneha", game:"Free Fire", score:900},
{name:"Arjun", game:"Call of Duty", score:850},
{name:"Kiran", game:"BGMI", score:800}

];

function saveData(){
localStorage.setItem(
"leaderboardData",
JSON.stringify(leaderboardData)
);
}

function displayLeaderboard(filter="All"){

let data = filter==="All"
? leaderboardData
: leaderboardData.filter(
item => item.game===filter
);

data.sort((a,b)=>b.score-a.score);

const table=document.getElementById("leaderboard");
table.innerHTML="";

data.forEach((player,index)=>{

let row=document.createElement("tr");

if(index===0) row.classList.add("rank1");
if(index===1) row.classList.add("rank2");
if(index===2) row.classList.add("rank3");

row.innerHTML=`
<td>${index+1}</td>
<td>${player.name}</td>
<td>${player.game}</td>
<td>${player.score}</td>
`;

table.appendChild(row);

});
}

function addScore(){

const name=document.getElementById("playerName").value;
const score=document.getElementById("playerScore").value;
const game=document.getElementById("gameType").value;

if(name==="" || score===""){
alert("Please enter player details");
return;
}

leaderboardData.push({
name:name,
game:game,
score:Number(score)
});

saveData();

displayLeaderboard(
document.getElementById("filterGame").value
);

document.getElementById("playerName").value="";
document.getElementById("playerScore").value="";
}

document
.getElementById("filterGame")
.addEventListener("change",function(){
displayLeaderboard(this.value);
});

displayLeaderboard();

</script>

</body>
</html>
